<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#1a1a1f"/>
      <stop offset="1" stop-color="#0a0a0e"/>
    </linearGradient>
    <linearGradient id="heat" x1="0.5" y1="1" x2="0.5" y2="0">
      <stop offset="0" stop-color="#1db954"/>
      <stop offset="0.45" stop-color="#dcc828"/>
      <stop offset="0.75" stop-color="#f08c28"/>
      <stop offset="1" stop-color="#dc3228"/>
    </linearGradient>
  </defs>

  <rect width="1024" height="1024" rx="224" fill="url(#bg)"/>

  <!-- center horizontal axis -->
  <line x1="160" y1="512" x2="864" y2="512" stroke="#2a2a32" stroke-width="6" stroke-linecap="round"/>

  <!-- centered FFT-style bars, 7 bars, heat gradient -->
  <g>
    <rect x="200" y="432" width="64" height="160" rx="14" fill="url(#heat)"/>
    <rect x="304" y="352" width="64" height="320" rx="14" fill="url(#heat)"/>
    <rect x="408" y="232" width="64" height="560" rx="14" fill="url(#heat)"/>
    <rect x="512" y="288" width="64" height="448" rx="14" fill="url(#heat)"/>
    <rect x="616" y="392" width="64" height="240" rx="14" fill="url(#heat)"/>
    <rect x="720" y="320" width="64" height="384" rx="14" fill="url(#heat)"/>
    <rect x="824" y="448" width="64" height="128" rx="14" fill="url(#heat)"/>
  </g>
</svg>
